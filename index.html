<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Learning Hub · BGA × BIST</title>

    <!-- Fonts: Space Grotesk (display / numerals), Manrope (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- KaTeX for clean math rendering. If the CDN is unreachable, MathText
         falls back to legible plain-text/unicode, so the exam still works. -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

    <style>
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; }

      /* Neutral palette driven by CSS variables so dark/light is one switch.
         The brand accent (BIST yellow / BGA blue) is unaffected. */
      :root, [data-mode='dark'] {
        --canvas: linear-gradient(180deg, #0B0D10 0%, #121519 100%);
        --ink: #F4F6F8;
        --text-rgb: 244, 246, 248;   /* muted text base */
        --fill-rgb: 255, 255, 255;   /* subtle fills / hairlines */
        --glass-bg: rgba(255, 255, 255, 0.055);
        --glass-border: rgba(255, 255, 255, 0.10);
        --glass-shadow: 0 20px 60px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.16);
        --rail-bg: rgba(255, 255, 255, 0.045);
        --input-bg: rgba(12, 14, 17, 0.5);
        --toast-bg: rgba(18, 21, 25, 0.9);
        --panel-bg: rgba(16, 19, 23, 0.92);
        --scrim: rgba(5, 6, 8, 0.55);
      }
      [data-mode='light'] {
        --canvas: linear-gradient(180deg, #EEF1F6 0%, #DEE4EC 100%);
        --ink: #1B2330;
        --text-rgb: 27, 35, 48;
        --fill-rgb: 27, 35, 48;
        --glass-bg: rgba(255, 255, 255, 0.72);
        --glass-border: rgba(27, 35, 48, 0.10);
        --glass-shadow: 0 20px 50px rgba(27, 35, 48, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.7);
        --rail-bg: rgba(255, 255, 255, 0.66);
        --input-bg: rgba(255, 255, 255, 0.8);
        --toast-bg: rgba(255, 255, 255, 0.94);
        --panel-bg: rgba(248, 250, 252, 0.92);
        --scrim: rgba(27, 35, 48, 0.28);
      }

      body {
        margin: 0;
        background: var(--canvas);
        font-family: 'Manrope', sans-serif;
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        transition: background 0.4s ease, color 0.4s ease;
      }
      ::-webkit-scrollbar { width: 9px; height: 9px; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 999px; }
      ::selection { background: rgba(255,200,61,0.3); }

      @keyframes qgspin { to { transform: rotate(360deg); } }
      @keyframes qgbloom { 0%,100% { transform: translate(0,0); } 50% { transform: translate(2%,1.5%); } }
      @keyframes qgfade { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes qgshim { 0% { background-position: -220% 0; } 100% { background-position: 220% 0; } }
      @keyframes qgblink { 50% { opacity: 0; } }
      @keyframes qgslide { from { transform: translateX(100%); } to { transform: translateX(0); } }
      @keyframes qgpop { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }

      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; transition: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
